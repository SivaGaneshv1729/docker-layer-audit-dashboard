version: '3.8'

services:
  analyzer:
    build:
      context: ./analyzer_tool
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: ./dashboard
    ports:
      - "${DASHBOARD_PORT:-3000}:80"
    depends_on:
      - analyzer
